<!DOCTYPE html>
<html>
<head>
<title>Fluppy Bird - 100% FIXED</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{ margin:0; overflow:hidden; font-family:Arial, sans-serif; background:skyblue;}
canvas{ display:block; z-index:1; }

#splashScreen, #titleScreen, #settingsScreen, #storeScreen, #gameOverOverlay{ 
    position:absolute; width:100%; height:100%; top:0; left:0; 
    display:flex; flex-direction:column; align-items:center; justify-content:center; 
    z-index:1000; transition: opacity 0.3s; 
}
#splashScreen{ background:linear-gradient(45deg, #000, #1a1a2e); }
#splashScreen img{ max-width:300px; max-height:300px; border-radius:20px; box-shadow:0 10px 40px rgba(255,255,0,0.5); }
#titleScreen{ background: linear-gradient(45deg, skyblue, #87CEEB); }
#settingsScreen{ background:#f0f0f0; flex-direction:row; padding-top:80px; }
#storeScreen{ background: linear-gradient(white, #f8f9fa); padding-top:60px; }
#gameOverOverlay{ 
    background: linear-gradient(45deg, rgba(0,0,0,0.9), rgba(139,69,19,0.8)); 
    color:#FFD700; text-shadow: 3px 3px 0 #000; font-family: 'Comic Sans MS', cursive;
    opacity:0;
}
#gameOverOverlay.show{ opacity:1 !important; }

#okBtn, #titleScreen button, #confirmSkinBtn{ 
    padding:15px 35px; font-size:22px; border:none; border-radius:15px; 
    cursor:pointer; transition:0.3s; font-weight:bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3); 
}
#okBtn{ position:absolute; bottom:80px; background:linear-gradient(45deg, #4CAF50, #45a049); color:white; }
#playBtn{ background:linear-gradient(45deg,#ffeb3b,#fbc02d); color:#000; font-size:24px; }
#settingsBtnMain{ background:linear-gradient(45deg,#ff9800,#f57c00); color:white; }
#storeBtn{ background:linear-gradient(45deg,#4fc3f7,#0288d1); color:white; }
#confirmSkinBtn{ background:#ccc; color:white; }
.confirmBtn.unlocked{ background: linear-gradient(45deg, #4CAF50, #45a049); }

#titleScreen h1{ font-size:60px; color:yellow; text-shadow:4px 4px 0 black; animation:bounce 1s infinite alternate; }
@keyframes bounce{0%{transform:translateY(0px);}100%{transform:translateY(-10px);}}

#settingsLeft{ width:40%; padding:20px; text-align:center; }
#settingsRight{ width:60%; padding:20px; background:rgba(255,255,255,0.95); border-radius:20px; overflow-y:auto; max-height:70vh; }
.settingsTab{ width:100%; padding:15px; margin:10px 0; font-size:24px; border:none; border-radius:10px; cursor:pointer; background:#ddd; }
.settingsTab.active{ background:linear-gradient(45deg,#4CAF50,#45a049); color:white; }
#difficultyOptions, #soundOptions{ display:none; }
#difficultyOptions.active, #soundOptions.active{ display:block; }
.minecraftToggle{ position:relative; width:60px; height:34px; background:#ccc; border-radius:34px; cursor:pointer; margin:10px auto; transition:0.4s; }
.minecraftToggle.active{ background:linear-gradient(45deg,#4CAF50,#45a049); }
.minecraftToggle::before{ content:""; position:absolute; height:26px; width:26px; left:4px; top:4px; background:white; border-radius:50%; transition:0.4s; }
.minecraftToggle.active::before{ transform:translateX(26px); }

.skinRow{ display:flex; gap:18px; width:95%; height:200px; overflow-x:auto; padding:15px; }
.skinBox{ min-width:140px; padding:15px; background:#fff; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1); cursor:pointer; text-align:center; }
.skinBox:hover, .skinBox.selected{ border:3px solid #4CAF50; box-shadow:0 8px 25px rgba(0,0,0,0.3); }
.skinBox img{ width:100px; height:100px; border-radius:10px; }
.lockOverlay{ position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); border-radius:15px; display:flex; align-items:center; justify-content:center; font-size:35px; color:white; }

.backBtn, .backStoreBtn{ position:absolute; top:15px; left:15px; font-size:32px; background:transparent; color:orange; border:none; cursor:pointer; z-index:10; }

#pauseBtn, #pauseResumeBtn, #pauseHomeBtn, #restartBtn, #homeBtn{ 
    position:absolute; z-index:2000; border:none; border-radius:12px; font-size:24px; 
    cursor:pointer; font-weight:bold; padding:20px 40px; box-shadow:0 4px 15px rgba(0,0,0,0.3);
}
#pauseBtn{ right:15px; top:15px; background:#ff9800; color:white; display:none; }
#pauseResumeBtn{ left:50%; top:35%; transform:translateX(-50%); background:#ff9800; color:white; display:none; }
#pauseHomeBtn{ left:50%; top:50%; transform:translateX(-50%); background:#03a9f4; color:white; display:none; }
#restartBtn{ left:50%; top:30%; transform:translateX(-50%); background:#ff5722; color:white; display:none; }
#homeBtn{ left:50%; top:45%; transform:translateX(-50%); background:#03a9f4; color:white; display:none; }

#finalScoreContainer{ font-size:60px; margin:30px 0; background:linear-gradient(45deg, #FFD700, #FFA500); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
#gameOverOverlay h2{ font-size:80px; margin:0; text-shadow:5px 5px 0 #000; animation:glow 2s infinite alternate; }
@keyframes glow{0%{text-shadow:5px 5px 0 #000;}100%{text-shadow:5px 5px 20px yellow;}}
</style>
</head>
<body>

<div id="splashScreen">
    <img src="Picsart_26-03-19_22-39-08-547.jpg" alt="Splash" onerror="this.style.display='none';">
    <button id="okBtn">OK</button>
</div>

<div id="titleScreen" style="display:none;">
    <h1>🕹️ Fluppy Bird</h1>
    <button id="playBtn">▶ Play Game</button>
    <button id="settingsBtnMain">⚙ Settings</button>
    <button id="storeBtn">🛍️ Store</button>
</div>

<div id="settingsScreen" style="display:none;">
    <button class="backBtn">←</button>
    <div id="settingsLeft">
        <h2>⚙️ Settings</h2>
        <button class="settingsTab active" data-tab="difficulty">Difficulty</button>
        <button class="settingsTab" data-tab="sounds">Music/Sounds</button>
    </div>
    <div id="settingsRight">
        <div id="difficultyOptions" class="active">
            <h3>Select Difficulty</h3>
            <label><input type="radio" name="difficulty" value="Very Easy" checked> Very Easy</label><br>
            <label><input type="radio" name="difficulty" value="Normal"> Normal</label><br>
            <label><input type="radio" name="difficulty" value="Hard"> Hard</label>
        </div>
        <div id="soundOptions">
            <h3>🔊 Sound Settings</h3>
            <label>All Sounds <span class="minecraftToggle active" id="allSoundsToggle"></span></label>
            <label>BG Music <span class="minecraftToggle active" id="bgMusicToggle"></span></label>
            <label>Score <span class="minecraftToggle active" id="scoreSoundToggle"></span></label>
            <label>Fly <span class="minecraftToggle active" id="flySoundToggle"></span></label>
        </div>
    </div>
</div>

<div id="storeScreen" style="display:none;">
    <button class="backStoreBtn">←</button>
    <h2>🛍️ Choose Skin</h2>
    <div id="upperSkinDisplay"></div>
    <div class="skinRow" id="skinRow"></div>
    <button id="confirmSkinBtn" class="confirmBtn locked">Confirm Skin</button>
</div>

<canvas id="gameCanvas"></canvas>

<button id="pauseBtn">⏸ Pause</button>
<button id="pauseResumeBtn">▶ Resume</button>
<button id="pauseHomeBtn">🏠 Home</button>
<button id="restartBtn">🔄 Restart</button>
<button id="homeBtn">🏠 Home</button>

<div id="gameOverOverlay">
    <h2>GAME OVER! 😵</h2>
    <div id="finalScoreContainer">Score: <span id="finalScore">0</span></div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

const skins = [
    {name:"Bird", file:"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIzMCIgY3k9IjMwIiByPSIyNSIgZmlsbD0iI2ZmYTAwMCIvPjxjaXJjbGUgY3g9IjIwIiBjeT0iMjAiIHI9IjQiIGZpbGw9IiM0NDQiLz48Y2lyY2xlIGN4PSI0MCIgY3k9IjIwIiByPSI0IiBmaWxsPSIjNDQ0Ii8+PHBhdGggZD0iTTI1IDQwIEw1NSAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNDQ0IiBzdHJva2Utd2lkdGg9IjMiLz48L3N2Zz4K", unlockScore:0, pipeColor:"#00c853", groundColor:"#8B4513"},
    {name:"Mango", file:"data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNjAiIGhlaWdodD0iNjAiIHZpZXdCb3g9IjAgMCA2MCA2MCIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj48Y2lyY2xlIGN4PSIzMCIgY3k9IjMwIiByPSIyNSIgZmlsbD0iI2ZmYTgwMCIvPjxjaXJjbGUgY3g9IjIwIiBjeT0iMjAiIHI9IjQiIGZpbGw9IiM0NDQiLz48Y2lyY2xlIGN4PSI0MCIgY3k9IjIwIiByPSI0IiBmaWxsPSIjNDQ0Ii8+PHBhdGggZD0iTTI1IDQwIEw1NSAyNCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSIjNDQ0IiBzdHJva2Utd2lkdGg9IjMiLz48L3N2Zz4K", unlockScore:10, pipeColor:"#FFA500", groundColor:"#FFCC80"}
];

let gameState = { 
    bird: {x:100,y:200,width:60,height:60,velocity:0,rotation:0}, 
    gravity: 0.4, pipes:[], score:0, highScore:0,
    gameOver:false, gameStarted:false, paused:false, 
    currentPipeSpeed:2.5, difficulty:"Normal", animationId:null,
    pipeSpacing:420, nextPipeDistance:420
};

let selectedSkin = skins[0];
let skinData = JSON.parse(localStorage.getItem("fluppySkins")) || {};
let soundSettings = {all:true, bgmusic:true, score:true, fly:true};

const elements = {
    splashScreen:document.getElementById("splashScreen"),
    titleScreen:document.getElementById("titleScreen"),
    settingsScreen:document.getElementById("settingsScreen"),
    storeScreen:document.getElementById("storeScreen"),
    gameOverOverlay:document.getElementById("gameOverOverlay"),
    playBtn:document.getElementById("playBtn"),
    settingsBtnMain:document.getElementById("settingsBtnMain"),
    storeBtn:document.getElementById("storeBtn"),
    okBtn:document.getElementById("okBtn"),
    pauseBtn:document.getElementById("pauseBtn"),
    pauseResumeBtn:document.getElementById("pauseResumeBtn"),
    pauseHomeBtn:document.getElementById("pauseHomeBtn"),
    restartBtn:document.getElementById("restartBtn"),
    homeBtn:document.getElementById("homeBtn"),
    finalScore:document.getElementById("finalScore")
};

const gapSizes = {"Very Easy":320,"Normal":260,"Hard":200};

// SPLASH SCREEN
elements.okBtn.onclick = () => {
    elements.splashScreen.style.display = "none";
    elements.titleScreen.style.display = "flex";
};

// SETTINGS TABS
document.querySelectorAll('.settingsTab').forEach(tab => {
    tab.onclick = () => {
        document.querySelectorAll('.settingsTab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('#settingsRight > div').forEach(d => d.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.tab + 'Options').classList.add('active');
    };
});

// SOUND TOGGLES - FIXED
['allSoundsToggle','bgMusicToggle','scoreSoundToggle','flySoundToggle'].forEach(id => {
    const toggle = document.getElementById(id);
    if(toggle) toggle.onclick = () => toggle.classList.toggle('active');
});

// DIFFICULTY - FIXED
document.querySelectorAll('input[name="difficulty"]').forEach(radio => {
    radio.onchange = () => {
        gameState.difficulty = radio.value;
        gameState.currentPipeSpeed = {"Very Easy":2.0,"Normal":2.5,"Hard":3.0}[radio.value];
        console.log("Difficulty:", gameState.difficulty); // Debug
    };
});

// START GAME
function startGame() {
    [elements.titleScreen, elements.settingsScreen, elements.storeScreen].forEach(el => el.style.display = "none");
    initGame();
    
    let countdown = 3;
    const overlay = document.createElement("div");
    overlay.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);color:yellow;font-size:140px;font-weight:bold;display:flex;align-items:center;justify-content:center;z-index:2001;";
    document.body.appendChild(overlay);
    
    const timer = setInterval(() => {
        overlay.textContent = countdown;
        countdown--;
        if(countdown < 0) {
            clearInterval(timer);
            document.body.removeChild(overlay);
            elements.pauseBtn.style.display = "block";
            gameState.gameStarted = true;
            gameLoop();
        }
    }, 800);
}

function initGame() {
    gameState.bird = {x:100,y:200,width:60,height:60,velocity:0,rotation:0};
    gameState.pipes = []; gameState.score = 0; gameState.gameOver = false;
    gameState.paused = false; gameState.gameStarted = false;
    gameState.nextPipeDistance = gameState.pipeSpacing;
}

function createPipe() {
    const gapSize = gapSizes[gameState.difficulty];
    const pipeTopHeight = 100 + Math.random() * (canvas.height - gapSize - 200);
    gameState.pipes.push({
        x: canvas.width, width: 70, topHeight: pipeTopHeight,
        bottomHeight: canvas.height - pipeTopHeight - gapSize - 70, scored: false
    });
}

function gameLoop() {
    gameState.animationId = requestAnimationFrame(gameLoop);
    if(!gameState.gameStarted || gameState.gameOver || gameState.paused) return;
    
    // Update bird
    gameState.bird.velocity += gameState.gravity;
    gameState.bird.y += gameState.bird.velocity;
    gameState.bird.rotation = Math.min(gameState.bird.velocity * 3, 25);
    
    ctx.clearRect(0,0,canvas.width,canvas.height);
    
    // Background
    ctx.fillStyle = "skyblue"; ctx.fillRect(0,0,canvas.width,canvas.height);
    
    // Pipes
    gameState.nextPipeDistance -= gameState.currentPipeSpeed;
    if(gameState.nextPipeDistance <= 0) {
        createPipe();
        gameState.nextPipeDistance = gameState.pipeSpacing;
    }
    
    for(let i = gameState.pipes.length - 1; i >= 0; i--) {
        let pipe = gameState.pipes[i];
        pipe.x -= gameState.currentPipeSpeed;
        
        ctx.fillStyle = selectedSkin.pipeColor;
        ctx.fillRect(pipe.x, 0, pipe.width, pipe.topHeight);
        ctx.fillRect(pipe.x, canvas.height - pipe.bottomHeight - 70, pipe.width, pipe.bottomHeight);
        
        // Collision
        if(gameState.bird.x < pipe.x + pipe.width && 
           gameState.bird.x + gameState.bird.width > pipe.x &&
           (gameState.bird.y < pipe.topHeight || 
            gameState.bird.y + gameState.bird.height > canvas.height - pipe.bottomHeight - 70)) {
            endGame();
            return;
        }
        
        // Score
        if(!pipe.scored && pipe.x + pipe.width < gameState.bird.x) {
            gameState.score++;
            pipe.scored = true;
            gameState.currentPipeSpeed = Math.min(gameState.currentPipeSpeed + 0.02, 5);
        }
        
        if(pipe.x + pipe.width < 0) gameState.pipes.splice(i, 1);
    }
    
    // Ground
    const groundHeight = 70;
    ctx.fillStyle = selectedSkin.groundColor;
    ctx.fillRect(0, canvas.height-groundHeight, canvas.width, groundHeight);
    
    // Ground collision
    if(gameState.bird.y + gameState.bird.height > canvas.height-70 || gameState.bird.y < 0) {
        endGame();
        return;
    }
    
    // Draw bird
    ctx.save();
    ctx.translate(gameState.bird.x + 30, gameState.bird.y + 30);
    ctx.rotate(gameState.bird.rotation * Math.PI / 180);
    ctx.drawImage(new Image(), -30, -30, 60, 60); // Fallback emoji bird
    ctx.restore();
    
    // UI
    ctx.fillStyle = "black"; ctx.font = "bold 32px Arial"; ctx.textAlign = "left";
    ctx.fillText(`Score: ${gameState.score}`, 25, 60);
    ctx.fillText(`High: ${gameState.highScore}`, 25, 100);
}

function endGame() {
    gameState.gameOver = true;
    if(gameState.animationId) cancelAnimationFrame(gameState.animationId);
    
    if(gameState.score > gameState.highScore) {
        gameState.highScore = gameState.score;
        localStorage.setItem("fluppyHighScore", gameState.highScore);
    }
    
    elements.finalScore.textContent = gameState.score;
    elements.gameOverOverlay.style.display = "flex";
    setTimeout(() => elements.gameOverOverlay.classList.add("show"), 100);
    
    elements.restartBtn.style.display = "block";
    elements.homeBtn.style.display = "block";
    elements.pauseBtn.style.display = "none";
}

function jump() {
    if(gameState.gameStarted && !gameState.gameOver && !gameState.paused) {
        gameState.bird.velocity = -8;
        gameState.bird.rotation = -20;
    }
}

// BUTTONS - ALL FIXED
elements.playBtn.onclick = startGame;
elements.settingsBtnMain.onclick = () => { elements.titleScreen.style.display="none"; elements.settingsScreen.style.display="flex"; };
document.querySelector('.backBtn').onclick = () => { elements.settingsScreen.style.display="none"; elements.titleScreen.style.display="flex"; };
elements.storeBtn.onclick = () => { elements.titleScreen.style.display="none"; elements.storeScreen.style.display="flex"; };
document.querySelector('.backStoreBtn').onclick = () => { elements.storeScreen.style.display="none"; elements.titleScreen.style.display="flex"; };

// PAUSE
elements.pauseBtn.onclick = () => {
    gameState.paused = true;
    elements.pauseBtn.style.display = "none";
    elements.pauseResumeBtn.style.display = "block";
    elements.pauseHomeBtn.style.display = "block";
};
elements.pauseResumeBtn.onclick = () => {
    gameState.paused = false;
    elements.pauseResumeBtn.style.display = "none";
    elements.pauseHomeBtn.style.display = "none";
    elements.pauseBtn.style.display = "block";
};
elements.pauseHomeBtn.onclick = () => {
    elements.titleScreen.style.display = "flex";
    [elements.pauseBtn, elements.pauseResumeBtn, elements.pauseHomeBtn].forEach(el => el.style.display = "none");
};

// GAME OVER BUTTONS - FIXED Z-INDEX
elements.restartBtn.onclick = () => {
    elements.gameOverOverlay.classList.remove("show");
    elements.gameOverOverlay.style.display = "none";
    [elements.restartBtn, elements.homeBtn].forEach(el => el.style.display = "none");
    startGame();
};

elements.homeBtn.onclick = () => {
    elements.gameOverOverlay.classList.remove("show");
    elements.gameOverOverlay.style.display = "none";
    elements.titleScreen.style.display = "flex";
    [elements.restartBtn, elements.homeBtn].forEach(el => el.style.display = "none");
};

// CONTROLS
document.addEventListener("click", e => {
    if(!e.target.closest('#splashScreen, #titleScreen, #settingsScreen, #storeScreen, #gameOverOverlay')) jump();
});
document.addEventListener("keydown", e => { if(e.code === "Space") { e.preventDefault(); jump(); } });

// START
elements.titleScreen.style.display = "flex";
gameState.highScore = parseInt(localStorage.getItem("fluppyHighScore")) || 0;
</script>
</body>
</html>
