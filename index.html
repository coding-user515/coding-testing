<!DOCTYPE html>
<html>
<head>
    <title>Fluppy Bird Pro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen">
        <img src="Picsart_26-03-19_22-39-08-547.jpg" alt="Splash" onerror="this.style.display='none';">
        <button id="okBtn">OK</button>
    </div>

    <!-- Title Screen -->
    <div id="titleScreen" style="display:none;">
        <h1>🕹️ Fluppy Bird Pro</h1>
        <button id="playBtn">▶ Play Game</button>
        <button id="settingsBtn">⚙ Settings</button>
        <button id="storeBtn">🛍️ Store</button>
    </div>

    <!-- Settings Screen -->
    <div id="settingsScreen" style="display:none;">
        <button class="backBtn">←</button>
        <div id="settingsLeft">
            <h2>⚙️ Settings</h2>
            <button class="settingsTab active" data-tab="difficulty">Difficulty</button>
            <button class="settingsTab" data-tab="sounds">🔊 7 Sounds</button>
        </div>
        <div id="settingsRight">
            <div id="difficultyOptions" class="active">
                <h3>Select Difficulty</h3>
                <label><input type="radio" name="difficulty" value="Very Easy" checked> Very Easy</label>
                <label><input type="radio" name="difficulty" value="Normal"> Normal</label>
                <label><input type="radio" name="difficulty" value="Hard"> Hard</label>
            </div>
            <div id="soundOptions">
                <h3>🔊 Sound Controls</h3>
                <div class="sound-control">
                    <span>All Sounds</span><span class="toggle-switch active" id="allSoundsToggle"></span>
                </div>
                <div class="sound-control">
                    <span>BG Music</span><span class="toggle-switch active" id="bgMusicToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Score</span><span class="toggle-switch active" id="scoreToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Fly</span><span class="toggle-switch active" id="flyToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Countdown</span><span class="toggle-switch active" id="countdownToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Button</span><span class="toggle-switch active" id="buttonToggle"></span>
                </div>
                <div class="sound-control">
                    <span>GameOver</span><span class="toggle-switch active" id="gameoverToggle"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Store & Game elements... (same as before) -->
    <canvas id="gameCanvas"></canvas>
    
    <!-- Scripts -->
    <script src="js/settings.js"></script>
    <script src="js/store.js"></script>
    <script src="js/game.js"></script>
    
    <!-- SPLASH SCREEN FIX -->
    <script>
    document.addEventListener('DOMContentLoaded', function() {
        const okBtn = document.getElementById('okBtn');
        const splash = document.getElementById('splashScreen');
        const title = document.getElementById('titleScreen');
        if (okBtn) {
            okBtn.onclick = () => {
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    title.style.display = 'flex';
                }, 500);
            };
        }
    });
    </script>
</body>
</html>
