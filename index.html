<!DOCTYPE html>
<html>
<head>
    <title>Fluppy Bird Pro v3.0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Splash Screen -->
    <div id="splashScreen">
        <img src="images/splash.jpg" alt="Splash" onerror="this.style.display='none';">
        <button id="okBtn">OK</button>
    </div>

    <!-- Title Screen -->
    <div id="titleScreen">
        <h1>🕹️ Fluppy Bird Pro</h1>
        <button id="playBtn">▶ Play Game</button>
        <button id="settingsBtn">⚙ Settings</button>
        <button id="storeBtn">🛍️ Store</button>
    </div>

    <!-- Settings Screen -->
    <div id="settingsScreen">
        <button class="backBtn">←</button>
        <div id="settingsLeft">
            <h2>⚙️ Settings</h2>
            <button class="settingsTab active" data-tab="difficulty">Difficulty</button>
            <button class="settingsTab" data-tab="sounds">🔊 7 Sounds</button>
        </div>
        <div id="settingsRight">
            <div id="difficultyOptions" class="active">
                <h3>Select Difficulty</h3>
                <label><input type="radio" name="difficulty" value="Very Easy" checked> Very Easy</label>
                <label><input type="radio" name="difficulty" value="Normal"> Normal</label>
                <label><input type="radio" name="difficulty" value="Hard"> Hard</label>
            </div>
            <div id="soundOptions">
                <h3>🔊 Sound Controls</h3>
                <div class="sound-control">
                    <span>All Sounds</span>
                    <span class="toggle-switch active" id="allSoundsToggle"></span>
                </div>
                <div class="sound-control">
                    <span>BG Music</span>
                    <span class="toggle-switch active" id="bgMusicToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Score Sound</span>
                    <span class="toggle-switch active" id="scoreToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Bird Fly</span>
                    <span class="toggle-switch active" id="flyToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Countdown</span>
                    <span class="toggle-switch active" id="countdownToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Buttons</span>
                    <span class="toggle-switch active" id="buttonToggle"></span>
                </div>
                <div class="sound-control">
                    <span>Game Over</span>
                    <span class="toggle-switch active" id="gameoverToggle"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Store Screen -->
    <div id="storeScreen">
        <button class="backStoreBtn">←</button>
        <h2>🛍️ Skin Store</h2>
        <div id="currentSkinPreview"></div>
        <div class="skinRow" id="skinRow"></div>
        <button id="confirmSkinBtn" class="confirmBtn locked">Confirm Skin</button>
    </div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>
    
    <!-- Game UI -->
    <button id="pauseBtn">⏸ Pause</button>
    <div id="pauseMenu" style="display:none;">
        <button id="resumeBtn">▶ Resume</button>
        <button id="pauseRestartBtn">🔄 Restart</button>
        <button id="pauseHomeBtn">🏠 Home</button>
    </div>

    <!-- Game Over -->
    <div id="gameOverOverlay">
        <h2>GAME OVER! 😵</h2>
        <div>Final Score: <span id="finalScore">0</span></div>
        <div>High Score: <span id="highScore">0</span></div>
        <button id="gameRestartBtn">🔄 Play Again</button>
        <button id="gameHomeBtn">🏠 Menu</button>
    </div>

    <!-- Scripts -->
    <script src="js/settings.js"></script>
    <script src="js/store.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
